<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Sleeping Princess</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #f5f0e8;
      --warm: #e8dfd0;
      --gold: #c9a96e;
      --deep: #1a1410;
      --muted: #7a6e62;
      --blush: #d4a8a0;
    }

    html, body {
      height: 100%;
      background: var(--deep);
      font-family: 'Cormorant Garamond', serif;
      color: var(--cream);
      overflow-x: hidden;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.5;
    }

    /* ── WRAPPER ── */
    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* ── HEADER ── */
    header {
      padding: 3rem 2rem 1.5rem;
      text-align: center;
      position: relative;
      animation: fadeDown 1.4s ease forwards;
      opacity: 0;
    }

    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-weight: 400;
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      letter-spacing: 0.12em;
      color: var(--cream);
      line-height: 1.2;
    }

    h1 em {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 0.55em;
      letter-spacing: 0.25em;
      color: var(--gold);
      margin-top: 0.4rem;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.8rem auto;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0 2rem 3rem;
      animation: fadeUp 1.6s ease 0.3s forwards;
      opacity: 0;
    }

    .portrait-wrap {
      position: relative;
      width: min(360px, 88vw);
    }

    /* Corner ornaments */
    .portrait-wrap::before,
    .portrait-wrap::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.7;
      z-index: 2;
    }
    .portrait-wrap::before {
      top: -8px; left: -8px;
      border-width: 1px 0 0 1px;
    }
    .portrait-wrap::after {
      bottom: -8px; right: -8px;
      border-width: 0 1px 1px 0;
    }

    .portrait-inner {
      position: relative;
      overflow: hidden;
    }

    .portrait-inner::before,
    .portrait-inner::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.7;
      z-index: 2;
    }
    .portrait-inner::before {
      top: -8px; right: -8px;
      border-width: 1px 1px 0 0;
    }
    .portrait-inner::after {
      bottom: -8px; left: -8px;
      border-width: 0 0 1px 1px;
    }

    .portrait-inner img {
      display: block;
      width: 100%;
      height: auto;
      filter: sepia(20%) contrast(1.05) brightness(0.92);
      transition: filter 1.2s ease;
    }

    .portrait-inner:hover img {
      filter: sepia(5%) contrast(1.02) brightness(1.0);
    }

    /* Dreamy vignette on image */
    .portrait-inner .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(26,20,16,0.55) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── CAPTION BENEATH PHOTO ── */
    .caption {
      margin-top: 2rem;
      text-align: center;
      animation: fadeUp 1.8s ease 0.6s forwards;
      opacity: 0;
    }

    .caption blockquote {
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.8;
      color: var(--warm);
      max-width: 460px;
      margin: 0 auto;
    }

    .caption cite {
      display: block;
      font-style: normal;
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      margin-top: 1rem;
    }

    /* ── FOOTER ── */
    footer {
      padding: 2rem;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 0.52rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      animation: fadeUp 2s ease 0.9s forwards;
      opacity: 0;
    }

    /* ── FLOATING PARTICLES ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: drift var(--dur) var(--delay) ease-in infinite;
    }

    @keyframes drift {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-10vh) translateX(var(--sway)); opacity: 0; }
    }

    /* ── KEYFRAMES ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Page glow top */
    .glow-top {
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(201,169,110,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>

<div class="glow-top"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="page">
  <header>
    <p class="eyebrow">A Portrait</p>
    <h1>The Sleeping Princess<em>in repose</em></h1>
    <div class="divider"></div>
  </header>

  <main class="hero">
    <div>
      <div class="portrait-wrap">
        <div class="portrait-inner">
            <div class="vignette"></div>
        </div>
      </div>

      <div class="caption">
        <blockquote>
          "And so she rests, in the soft silence<br/>
          between one dream and another —<br/>
          where time itself forgets to move."
        </blockquote>
        <cite>— The Sleeping Princess</cite>
      </div>
    </div>
  </main>

  <footer>
    <p>✦ &nbsp; A moment suspended &nbsp; ✦</p>
  </footer>
</div>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.classList.add('particle');
    const left = Math.random() * 100;
    const dur  = 8 + Math.random() * 14;
    const delay = Math.random() * 12;
    const sway = (Math.random() - 0.5) * 120 + 'px';
    p.style.cssText = `left:${left}%;--dur:${dur}s;--delay:${delay}s;--sway:${sway};`;
    container.appendChild(p);
  }
</script>
</body>
</html>
